name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: integrationops
          POSTGRES_PASSWORD: integrationops
          POSTGRES_DB: integrationops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U integrationops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://integrationops:integrationops@localhost:5432/integrationops
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret
      CELERY_TASK_ALWAYS_EAGER: "true"
      JOB_RETRY_COUNTDOWN_SECONDS: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate migrations (upgrade + downgrade)
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Run tests
        run: pytest
