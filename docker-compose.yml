services:
  api:
    build: .
    container_name: integrationops_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Hot-reload for local development; the image CMD is used in production.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - export_data:/app/exports

  worker:
    build: .
    container_name: integrationops_worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./app:/app/app
      - export_data:/app/exports

  db:
    image: postgres:16-alpine
    container_name: integrationops_db
    environment:
      POSTGRES_USER: integrationops
      POSTGRES_PASSWORD: integrationops
      POSTGRES_DB: integrationops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrationops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: integrationops_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  export_data:
